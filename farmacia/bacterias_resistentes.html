<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bactérias de Alta Resistência</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f3ef;
    color: #2c2c2a;
    min-height: 100vh;
    padding: 28px 16px 48px;
  }

  .page { max-width: 900px; margin: 0 auto; }

  /* ── Cover ── */
  .cover {
    background: #26215C;
    border-radius: 16px;
    padding: 32px 36px;
    margin-bottom: 20px;
    text-align: center;
  }
  .cover h1 { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .cover p  { font-size: 13px; color: #b0acdf; }

  /* ── Legend ── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 12px;
    justify-content: center;
    background: #eae9e3;
    border-radius: 10px;
    padding: 12px 20px;
    margin-bottom: 28px;
    font-size: 12px; font-weight: 600;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot  { width: 10px; height: 10px; border-radius: 50%; }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #d3d1c7;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    transition: box-shadow .2s;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.1); }

  .card-header {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 14px 16px 12px;
    cursor: pointer;
    user-select: none;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .card-title    { font-size: 15px; font-weight: 700; }
  .card-subtitle { font-size: 11px; color: #73726c; margin-top: 3px; line-height: 1.4; }
  .chevron { margin-left: auto; font-size: 16px; color: #aaa; transition: transform .25s; flex-shrink: 0; margin-top: 2px; }
  .card.open .chevron { transform: rotate(180deg); }

  .tags { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 16px 12px; }
  .tag {
    font-size: 10px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
  }

  /* ── Body ── */
  .card-body { display: none; padding: 0 16px 14px; }
  .card.open .card-body { display: block; }

  .divider { height: 1px; background: #eae9e3; margin: 8px 0; }

  .field-label {
    font-size: 9px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: #888780;
    margin-bottom: 5px; margin-top: 10px;
  }
  .field-label:first-child { margin-top: 4px; }

  ul.items { padding-left: 0; list-style: none; }
  ul.items li {
    font-size: 12.5px; color: #444441; line-height: 1.55;
    padding: 2px 0 2px 14px;
    position: relative;
  }
  ul.items li::before {
    content: "•"; position: absolute; left: 0;
    color: #aaa; font-size: 13px;
  }

  /* ── Expand all ── */
  .toolbar {
    display: flex; justify-content: flex-end; gap: 8px;
    margin-bottom: 14px;
  }
  .btn {
    font-size: 12px; font-weight: 600;
    padding: 6px 14px; border-radius: 8px; border: 1px solid #d3d1c7;
    background: #fff; color: #444; cursor: pointer;
    transition: background .15s;
  }
  .btn:hover { background: #f1efe8; }

  /* ── Footer ── */
  .footer {
    text-align: center; font-size: 11px; color: #888;
    margin-top: 36px;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .cover h1 { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="cover">
    <h1>Bactérias de Alta Resistência</h1>
    <p>Mecanismos de resistência · Tratamento · Grupo de risco · Virulência</p>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#534AB7"></div> Gram-positiva</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0F6E56"></div> Gram-negativa</div>
    <div class="legend-item"><div class="legend-dot" style="background:#993C1D"></div> Diplococo gram-negativo</div>
  </div>

  <div class="toolbar">
    <button class="btn" onclick="toggleAll(true)">Expandir todos</button>
    <button class="btn" onclick="toggleAll(false)">Recolher todos</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer">Referência clínica — Bactérias Resistentes</div>
</div>

const fields = [
  { label: "🔬 Mecanismo de Resistência", key: "mec" },
  { label: "💊 Tratamento",               key: "trat" },
  { label: "⚠️ Grupo de Risco",           key: "risco" },
  { label: "⚡ Fatores de Virulência",    key: "vir" }
];

function buildCard(b) {
  const card = document.createElement("div");
  card.className = "card";

  const tagHTML = [
    `<span class="tag" style="background:${b.bg};color:${b.fg}">${b.gram}</span>`,
    ...b.tags.map(t => `<span class="tag" style="background:#f1efe8;color:#5f5e5a">${t}</span>`)
  ].join("");

  const bodyHTML = fields.map(f => `
    <div class="field-label">${f.label}</div>
    <ul class="items">${b[f.key].map(i => `<li>${i}</li>`).join("")}</ul>
    <div class="divider"></div>
  `).join("");

  card.innerHTML = `
    <div class="card-header" onclick="this.parentNode.classList.toggle('open')">
      <div class="dot" style="background:${b.color}"></div>
      <div>
        <div class="card-title">${b.name}</div>
        <div class="card-subtitle">${b.full}</div>
      </div>
      <div class="chevron">▾</div>
    </div>
    <div class="tags">${tagHTML}</div>
    <div class="card-body">${bodyHTML}</div>
  `;
  return card;
}

function toggleAll(open) {
  document.querySelectorAll(".card").forEach(c =>
    open ? c.classList.add("open") : c.classList.remove("open"));
}

const grid = document.getElementById("grid");
data.forEach(b => grid.appendChild(buildCard(b)));
</script>
</body>
</html>
